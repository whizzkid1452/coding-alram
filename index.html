<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>코테 알람</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ==================== 메인 화면: 알람 목록 ==================== -->
  <div id="screen-main" class="screen active">
    <div class="header">
      <h1>&#128187; 코테 알람</h1>
      <div class="header-actions">
        <button class="btn-icon" onclick="openProblemSelect()" title="문제 선택">&#128218;</button>
        <button class="btn-icon" onclick="quickTest()" title="즉시 테스트">&#9654;</button>
        <button class="btn-icon" onclick="openAddAlarm()" title="알람 추가">&#43;</button>
      </div>
    </div>
    <div id="alarm-list" class="alarm-list"></div>
  </div>

  <!-- ==================== 문제 선택 화면 ==================== -->
  <div id="screen-select" class="screen">
    <div class="screen-header">
      <button class="btn-text" onclick="showScreen('main')">뒤로</button>
      <h2>문제 선택</h2>
      <div style="width:60px"></div>
    </div>

    <!-- 카테고리 탭 -->
    <div class="category-tabs">
      <button class="cat-tab active" data-cat="all" onclick="selectCategory('all', this)">
        전체 <span class="cat-count" id="count-all"></span>
      </button>
      <button class="cat-tab" data-cat="algorithm" onclick="selectCategory('algorithm', this)">
        알고리즘 <span class="cat-count" id="count-algorithm"></span>
      </button>
      <button class="cat-tab" data-cat="practical" onclick="selectCategory('practical', this)">
        실무 <span class="cat-count" id="count-practical"></span>
      </button>
      <button class="cat-tab" data-cat="toss" onclick="selectCategory('toss', this)">
        토스 <span class="cat-count" id="count-toss"></span>
      </button>
      <button class="cat-tab" data-cat="async" onclick="selectCategory('async', this)">
        비동기 <span class="cat-count" id="count-async"></span>
      </button>
    </div>

    <!-- 진행 상황 바 -->
    <div class="progress-bar-container">
      <div class="progress-info">
        <span id="progress-text">0 / 0 풀이 완료</span>
        <span id="progress-percent">0%</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="progress-fill"></div>
      </div>
    </div>

    <!-- 문제 리스트 -->
    <div id="problem-list" class="problem-list"></div>
  </div>

  <!-- ==================== 알람 추가 화면 ==================== -->
  <div id="screen-add" class="screen">
    <div class="screen-header">
      <button class="btn-text" onclick="showScreen('main')">취소</button>
      <h2>알람 추가</h2>
      <button class="btn-text" onclick="saveAlarm()">저장</button>
    </div>

    <!-- 시간 선택 -->
    <div class="time-picker">
      <input type="number" id="inp-hour" min="0" max="23" value="07" placeholder="07">
      <span class="colon">:</span>
      <input type="number" id="inp-minute" min="0" max="59" value="00" placeholder="00">
    </div>

    <!-- 반복 요일 -->
    <div class="form-section">
      <label>반복</label>
      <div class="day-selector">
        <button class="day-btn" data-day="0" onclick="toggleDay(this)">일</button>
        <button class="day-btn" data-day="1" onclick="toggleDay(this)">월</button>
        <button class="day-btn" data-day="2" onclick="toggleDay(this)">화</button>
        <button class="day-btn" data-day="3" onclick="toggleDay(this)">수</button>
        <button class="day-btn" data-day="4" onclick="toggleDay(this)">목</button>
        <button class="day-btn" data-day="5" onclick="toggleDay(this)">금</button>
        <button class="day-btn" data-day="6" onclick="toggleDay(this)">토</button>
      </div>
      <div class="quick-btns">
        <button class="quick-btn" onclick="quickSelectDays('weekday')">평일</button>
        <button class="quick-btn" onclick="quickSelectDays('weekend')">주말</button>
        <button class="quick-btn" onclick="quickSelectDays('everyday')">매일</button>
        <button class="quick-btn" onclick="quickSelectDays('none')">초기화</button>
      </div>
    </div>

    <!-- 라벨 -->
    <div class="form-section">
      <label>라벨</label>
      <input type="text" class="form-input" id="inp-label" value="코테 알람" placeholder="알람 이름">
    </div>

    <button class="btn-save" onclick="saveAlarm()">저장</button>
  </div>

  <!-- ==================== 문제 풀기 화면 (Split View) ==================== -->
  <div id="screen-problem" class="screen">
    <!-- 상단 바 -->
    <div class="problem-header">
      <span class="badge" id="problem-id">BOJ</span>
      <span class="timer" id="timer">00:00</span>
    </div>

    <!-- 스플릿 뷰 -->
    <div class="split-view">
      <!-- 왼쪽: 문제 설명 -->
      <div class="split-left">
        <div class="panel-title">&#128196; 문제</div>
        <div class="panel-body">
          <h2 class="problem-title" id="problem-title"></h2>
          <div class="problem-desc" id="problem-desc"></div>
          <div id="examples"></div>
          <div id="hint-area" style="display:none"></div>
        </div>
      </div>

      <!-- 드래그 핸들 -->
      <div class="split-divider" id="split-divider"></div>

      <!-- 오른쪽: 코드 에디터 -->
      <div class="split-right">
        <div class="panel-title">&#128187; 코드</div>
        <div class="code-editor">
          <textarea class="code-textarea" id="code-editor" spellcheck="false" autocomplete="off" autocorrect="off" autocapitalize="off"></textarea>
          <div class="results" id="results" style="display:none"></div>
        </div>
        <div class="bottom-bar">
          <button class="btn-hint" onclick="revealHint()">&#128161; 힌트</button>
          <button class="btn-submit" onclick="submitCode()">&#9654; 제출</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ==================== 알람 울리는 화면 (오버레이) ==================== -->
  <div class="ringing-overlay">
    <div class="ringing-icon">&#9200;</div>
    <div class="ringing-time" id="ringing-time">오전 7:00</div>
    <div class="ringing-label" id="ringing-label">코테 알람</div>
    <button class="btn-solve" onclick="startSolving()">문제 풀고 알람 끄기</button>
  </div>

  <!-- ==================== 정답 화면 ==================== -->
  <div class="solved-screen">
    <div class="solved-icon">&#127881;</div>
    <div class="solved-title">정답입니다!</div>
    <div class="solved-stats">
      문제: <span id="solved-problem"></span><br>
      풀이 시간: <span id="solved-time"></span>
    </div>
    <button class="btn-dismiss" onclick="dismissAlarm()">알람 끄기</button>
  </div>

  <script src="problems.js"></script>
  <script src="challenges.js"></script>
  <script src="app.js"></script>
</body>
</html>
